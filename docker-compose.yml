version: '3.9'

services:
  backend:
    build: .
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      JWT_SECRET: change_this_jwt_secret
      JWT_EXPIRES_IN: 1d
      MONGODB_URI: mongodb://mongo:27017/task_manager_api
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
